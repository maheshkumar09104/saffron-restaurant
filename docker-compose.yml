version: "3"

services:

  mongo:
    image: mongo
    container_name: mongo-db
    ports:
      - "27017:27017"

  server:
    build: ./server
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - server